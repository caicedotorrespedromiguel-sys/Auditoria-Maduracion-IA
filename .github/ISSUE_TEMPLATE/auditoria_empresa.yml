name: Auditoría de Madurez IA
description: Registra una auditoría de madurez en IA para una empresa
title: "Auditoría IA - [Nombre Empresa]"
labels: ["auditoría", "madurez-ia"]
body:
  - type: markdown
    attributes:
      value: |
        # Auditoría Dinámica de Madurez IA
        Completa esta auditoría evaluando los niveles de madurez en IA de la empresa (escala 1-5)
  
  - type: input
    id: empresa
    attributes:
      label: Nombre de la Empresa
      placeholder: "Ej: Acme Corporation"
    validations:
      required: true
  
  - type: dropdown
    id: infraestructura
    attributes:
      label: Infraestructura de Datos
      description: Nivel de madurez de la infraestructura de datos
      options:
        - "1 - Muy Bajo"
        - "2 - Bajo"
        - "3 - Medio"
        - "4 - Alto"
        - "5 - Muy Alto"
    validations:
      required: true
  
  - type: dropdown
    id: calidad_datos
    attributes:
      label: Calidad de Registros
      description: Nivel de calidad de los datos registrados
      options:
        - "1 - Muy Bajo"
        - "2 - Bajo"
        - "3 - Medio"
        - "4 - Alto"
        - "5 - Muy Alto"
    validations:
      required: true
  
  - type: dropdown
    id: talento_humano
    attributes:
      label: Talento Humano
      description: Nivel de capacidad en talento humano para IA
      options:
        - "1 - Muy Bajo"
        - "2 - Bajo"
        - "3 - Medio"
        - "4 - Alto"
        - "5 - Muy Alto"
    validations:
      required: true
  
  - type: dropdown
    id: integracion_apis
    attributes:
      label: Integración (APIs)
      description: Nivel de integración y APIs disponibles
      options:
        - "1 - Muy Bajo"
        - "2 - Bajo"
        - "3 - Medio"
        - "4 - Alto"
        - "5 - Muy Alto"
    validations:
      required: true
  
  - type: textarea
    id: hallazgos
    attributes:
      label: Hallazgos Principales
      description: Describe los hallazgos principales de la auditoría
      placeholder: "Detalla los hallazgos clave encontrados durante la auditoría..."
    validations:
      required: true
  
  - type: textarea
    id: recomendaciones
    attributes:
      label: Recomendaciones
      description: Proporciona recomendaciones para mejorar la madurez en IA
      placeholder: "Sugiere las mejoras necesarias..."
    validations:
      required: false
  
  - type: checkboxes
    id: verificacion
    attributes:
      label: Verificación
      options:
        - label: "He completado la auditoría de forma exhaustiva"
          required: true
        - label: "Los datos proporcionados son precisos"
          required: true
